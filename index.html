<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tutorial GitHub — Indice</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --brand:      #0969da;
      --brand-dark: #0550ae;
      --brand-light:#dbeafe;
      --green:      #1a7f37;
      --green-bg:   #dcfce7;
      --gray-50:    #f6f8fa;
      --gray-100:   #eaeef2;
      --gray-200:   #d0d7de;
      --gray-500:   #6e7781;
      --gray-700:   #424a53;
      --gray-900:   #24292f;
      --radius:     10px;
      --shadow:     0 1px 3px rgba(0,0,0,.10), 0 1px 2px rgba(0,0,0,.07);
      --shadow-md:  0 4px 16px rgba(0,0,0,.10);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 16px;
      line-height: 1.6;
      color: var(--gray-900);
      background: var(--gray-50);
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: linear-gradient(135deg, #0d1117 0%, #161b22 60%, #21262d 100%);
      color: #e6edf3;
      padding: 2.5rem 2rem 2rem;
      text-align: center;
    }
    header .logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 0.8rem;
    }
    header h1 {
      font-size: 1.9rem;
      font-weight: 700;
      letter-spacing: -0.01em;
    }
    header p {
      color: #8b949e;
      font-size: 0.95rem;
      margin-top: 0.3rem;
    }
    header .badge {
      display: inline-block;
      background: rgba(56,139,253,.15);
      border: 1px solid rgba(56,139,253,.4);
      color: #58a6ff;
      font-size: 0.75rem;
      font-weight: 600;
      padding: .2rem .7rem;
      border-radius: 20px;
      margin-bottom: 0.8rem;
      letter-spacing: 0.05em;
    }

    /* ── Main container ── */
    main {
      max-width: 860px;
      margin: 2.5rem auto;
      padding: 0 1.5rem 4rem;
    }

    /* ── Section title ── */
    .section-title {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--gray-500);
      margin: 2rem 0 0.8rem;
    }
    .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--gray-200);
    }

    /* ── Cards grid ── */
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 1rem;
    }

    /* ── HTML Card ── */
    .card {
      background: white;
      border: 1px solid var(--gray-200);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      transition: box-shadow .2s, transform .2s, border-color .2s;
      overflow: hidden;
    }
    .card:hover {
      box-shadow: var(--shadow-md);
      transform: translateY(-2px);
      border-color: #9ecbff;
    }

    .card-html a {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1.3rem 1.4rem;
      text-decoration: none;
      color: inherit;
    }
    .card-html .icon-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 48px; height: 48px;
      background: var(--brand-light);
      border-radius: 8px;
      flex-shrink: 0;
    }
    .card-html .icon-wrap svg { width: 26px; height: 26px; }
    .card-html .info { flex: 1; min-width: 0; }
    .card-html .filename {
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--brand);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .card-html .desc {
      font-size: 0.82rem;
      color: var(--gray-500);
      margin-top: 0.15rem;
    }
    .card-html .arrow {
      color: var(--gray-200);
      font-size: 1.1rem;
      transition: color .2s, transform .2s;
    }
    .card-html:hover .arrow {
      color: var(--brand);
      transform: translateX(3px);
    }

    /* ── Video Card ── */
    .card-video {
      display: flex;
      flex-direction: column;
    }
    .card-video .video-header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.9rem 1.2rem 0.7rem;
      border-bottom: 1px solid var(--gray-100);
    }
    .card-video .video-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px; height: 36px;
      background: #fff8f0;
      border-radius: 8px;
      border: 1px solid #ffd8a8;
      flex-shrink: 0;
    }
    .card-video .video-filename {
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--gray-900);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .card-video .video-desc {
      font-size: 0.78rem;
      color: var(--gray-500);
    }

    .card-video .video-preview {
      position: relative;
      cursor: pointer;
      background: #000;
      line-height: 0;
    }
    .card-video .video-preview video {
      width: 100%;
      display: block;
      max-height: 280px;
      object-fit: contain;
      pointer-events: none;
    }
    .card-video .play-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, .25);
      transition: background .2s;
    }
    .card-video .video-preview:hover .play-overlay {
      background: rgba(0, 0, 0, .42);
    }
    .card-video .play-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 60px; height: 60px;
      border-radius: 50%;
      background: rgba(255, 255, 255, .92);
      box-shadow: 0 2px 12px rgba(0,0,0,.35);
      transition: transform .2s, background .2s;
    }
    .card-video .video-preview:hover .play-btn {
      transform: scale(1.1);
      background: #fff;
    }
    .card-video .play-btn svg {
      margin-left: 4px;
    }

    .card-video .video-footer {
      padding: 0.6rem 1.2rem;
      background: var(--gray-50);
      border-top: 1px solid var(--gray-100);
    }
    .card-video .video-footer span {
      font-size: 0.78rem;
      color: var(--gray-500);
    }

    /* ── Empty state ── */
    .empty {
      text-align: center;
      color: var(--gray-500);
      font-size: 0.88rem;
      padding: 1.5rem;
      background: white;
      border: 1px dashed var(--gray-200);
      border-radius: var(--radius);
    }

    /* ── Footer ── */
    footer {
      text-align: center;
      font-size: 0.78rem;
      color: var(--gray-500);
      padding: 1.5rem 1rem;
      border-top: 1px solid var(--gray-200);
      background: white;
    }
  </style>
</head>
<body>

<header>
  <div class="badge">CORSO TEPSIT — ANNO 3</div>
  <div class="logo">
    <svg height="32" viewBox="0 0 16 16" fill="white" xmlns="http://www.w3.org/2000/svg">
      <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38
               0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13
               -.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87
               2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95
               0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12
               0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27
               1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82
               2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48
               0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0
               0016 8c0-4.42-3.58-8-8-8z"/>
    </svg>
    <h1>Tutorial GitHub</h1>
  </div>
  <p>Materiale didattico — seleziona una risorsa per aprirla</p>
</header>

<main>

  <!-- ── Documenti HTML ── -->
  <div class="section-title">
    <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M2.75 1h10.5c.966 0 1.75.784 1.75 1.75v10.5A1.75 1.75 0 0 1 13.25 15H2.75A1.75 1.75 0 0 1 1 13.25V2.75C1 1.784 1.784 1 2.75 1Zm0 1.5a.25.25 0 0 0-.25.25v10.5c0 .138.112.25.25.25h10.5a.25.25 0 0 0 .25-.25V2.75a.25.25 0 0 0-.25-.25Z"/></svg>
    Documenti HTML
  </div>

  <div class="cards" id="html-cards">
    <!-- populated by JS -->
  </div>

  <!-- ── Video ── -->
  <div class="section-title">
    <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M0 3.75A.75.75 0 0 1 .75 3h14.5a.75.75 0 0 1 0 1.5H.75A.75.75 0 0 1 0 3.75ZM6.5 6.75A.75.75 0 0 1 7.25 6h1.5a.75.75 0 0 1 0 1.5h-1.5A.75.75 0 0 1 6.5 6.75ZM.75 9h14.5a.75.75 0 0 1 0 1.5H.75a.75.75 0 0 1 0-1.5Z"/></svg>
    Video
  </div>

  <div class="cards" id="video-cards">
    <!-- populated by JS -->
  </div>

</main>

<footer>
  Tutorial GitHub &nbsp;·&nbsp; Corso TEPSIT - Anno 3
</footer>

<script>
  // ── Catalog ─────────────────────────────────────────────────────
  // Aggiungere qui nuovi file HTML o MP4 man mano che vengono creati.
  const htmlFiles = [
    {
      file: "tutorial-github.html",
      title: "Introduzione a GitHub",
      desc:  "Storia, concetti fondamentali (repo, branch, commit, push/pull) e GitHub Desktop"
    },
    {
      file: "Team_su_GitHub.html",
      title: "Collaboratori, Branch e Fork",
      desc:  "Gestione collaboratori, strategie di branching, fork per contribuire vs fork personale — pro, contro e casi d'uso"
    }
  ];

  const videoFiles = [
    {
      file:  "Introduzione_a_GitHub.mp4",
      title: "Introduzione a GitHub",
      desc:  "Video introduttivo alla piattaforma"
    },
    {
      file:  "Team_su_GitHub.mp4",
      title: "Team su GitHub",
      desc:  "Collaboratori, branch e fork — lavorare in team su GitHub"
    }
  ];

  // ── Render HTML cards ────────────────────────────────────────────
  const htmlContainer = document.getElementById("html-cards");

  if (htmlFiles.length === 0) {
    htmlContainer.innerHTML = '<div class="empty">Nessun documento HTML disponibile.</div>';
  } else {
    htmlFiles.forEach(f => {
      htmlContainer.insertAdjacentHTML("beforeend", `
        <div class="card card-html">
          <a href="${f.file}" target="_blank">
            <div class="icon-wrap">
              <svg viewBox="0 0 24 24" fill="none" stroke="#0969da" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                <polyline points="14 2 14 8 20 8"/>
                <line x1="16" y1="13" x2="8" y2="13"/>
                <line x1="16" y1="17" x2="8" y2="17"/>
                <polyline points="10 9 9 9 8 9"/>
              </svg>
            </div>
            <div class="info">
              <div class="filename">${f.title}</div>
              <div class="desc">${f.file} &nbsp;·&nbsp; ${f.desc}</div>
            </div>
            <span class="arrow">›</span>
          </a>
        </div>
      `);
    });
  }

  // ── Render Video cards ───────────────────────────────────────────
  const videoContainer = document.getElementById("video-cards");

  if (videoFiles.length === 0) {
    videoContainer.innerHTML = '<div class="empty">Nessun video disponibile.</div>';
  } else {
    videoFiles.forEach(f => {
      videoContainer.insertAdjacentHTML("beforeend", `
        <div class="card card-video">
          <div class="video-header">
            <div class="video-icon">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#bc4c00" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polygon points="23 7 16 12 23 17 23 7"/>
                <rect x="1" y="5" width="15" height="14" rx="2" ry="2"/>
              </svg>
            </div>
            <div>
              <div class="video-filename">${f.title}</div>
              <div class="video-desc">${f.file}</div>
            </div>
          </div>
          <div class="video-preview" onclick="window.open('${f.file}', '_blank')">
            <video preload="metadata">
              <source src="${f.file}" type="video/mp4" />
            </video>
            <div class="play-overlay">
              <div class="play-btn">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="#bc4c00">
                  <polygon points="5 3 19 12 5 21 5 3"/>
                </svg>
              </div>
            </div>
          </div>
          <div class="video-footer">
            <span>${f.desc}</span>
          </div>
        </div>
      `);
    });
  }
</script>

</body>
</html>
